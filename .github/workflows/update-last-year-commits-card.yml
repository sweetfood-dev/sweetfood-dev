name: Update Last-Year Commits Card

on:
  schedule:
    - cron: "15 0 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update commits_year and title in README
        run: |
          python3 - <<'PY'
          import datetime
          import pathlib
          import re

          readme = pathlib.Path("README.md")
          content = readme.read_text(encoding="utf-8")
          year = datetime.datetime.utcnow().year - 1

          updated = re.sub(r"commits_year=\d{4}", f"commits_year={year}", content)
          updated = re.sub(
              r"custom_title=Total%20Commits%20\(\d{4}\)",
              f"custom_title=Total%20Commits%20({year})",
              updated,
          )

          if updated != content:
              readme.write_text(updated, encoding="utf-8")
              print("README updated")
          else:
              print("No change")
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md; then
            echo "No README changes"
            exit 0
          fi

          last_year=$(python3 - <<'PY'
          import datetime
          print(datetime.datetime.utcnow().year - 1)
          PY
          )

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update last-year commits card to ${last_year}"
          git push
