<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" role="img" aria-label="Total Commits Last Year">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e96443"/>
      <stop offset="100%" stop-color="#904e95"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" rx="10" ry="10" fill="url(#g)"/>
  <text x="20" y="44" fill="#ffffff" font-size="22" font-family="Arial, sans-serif" font-weight="700">Total Commits (Last Year)</text>
  <text x="20" y="86" fill="#ffffff" font-size="14" font-family="Arial, sans-serif">This card updates daily via GitHub Actions.</text>
  <text x="20" y="112" fill="#ffffff" font-size="14" font-family="Arial, sans-serif">Requires GH_STATS_TOKEN with repo + read:user.</text>
</svg>
